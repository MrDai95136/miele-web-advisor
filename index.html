<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miele高阶使用顾问 - 前美诺销售专家</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🦁 Miele高阶使用顾问</h1>
            <p>前美诺销售专家 · 四丶十二</p>
        </header>

        <!-- Product Selection -->
        <section class="product-selection">
            <h2>选择您的Miele产品</h2>
            <div class="product-buttons">
                <button class="product-btn" data-product="washer">洗衣机</button>
                <button class="product-btn" data-product="dishwasher">洗碗机</button>
                <button class="product-btn" data-product="oven">烤箱/蒸炉</button>
                <button class="product-btn" data-product="coffee">咖啡机</button>
            </div>
        </section>

        <!-- Question Input -->
        <section class="question-section" id="questionSection" style="display: none;">
            <h2>您的问题是什么？</h2>
            <textarea id="userQuestion" placeholder="例如：棉质衣物怎么洗？羽绒服能用Miele洗吗？"></textarea>
            <button id="getAnswer">获取专业建议</button>
        </section>

        <!-- Answer Display -->
        <section class="answer-section" id="answerSection" style="display: none;">
            <h2>专业建议</h2>
            <div id="answerContent"></div>
            <button id="newQuestion">问新问题</button>
        </section>

        <!-- Share Button -->
        <div class="share-section">
            <button id="shareBtn">分享到微信</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
